<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark radial background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <!-- Bright white/gray glow for the clock face -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Outer Ring with Subtle Glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#374151" stroke-width="8" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#f3f4f6" stroke-width="4" filter="url(#glow)" opacity="0.8" />

  <!-- Hour and Minute Hands representing a clean time like 10:10 -->
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="160" y2="180" stroke="#f3f4f6" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="350" y2="160" stroke="#f3f4f6" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />

  <!-- Center Pin -->
  <circle cx="256" cy="256" r="14" fill="#f3f4f6" filter="url(#glow)" />
  <circle cx="256" cy="256" r="6" fill="#000000" />
</svg>
